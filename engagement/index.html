<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap');

  :root{
    --indigo: #1B2340;
    --indigo-2: #262F52;
    --gold: #C9A24B;
    --gold-soft: #E4CD97;
    --ivory: #F8F4EA;
    --wine: #6B1F2B;
    --charcoal: #2A2A28;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0; padding:0;
    background: var(--indigo);
    color: var(--ivory);
    font-family: 'Inter', sans-serif;
  }

  .stage{
    min-height:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding: 48px 20px 80px;
    position:relative;
    overflow-x:hidden;
  }

  .stage::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0; height:340px;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(201,162,75,0.18), transparent 60%);
    pointer-events:none;
  }

  .photo-wrap{
    width:100%;
    max-width: 460px;
    border-radius: 18px 18px 0 0;
    overflow:hidden;
    z-index:1;
    animation: rise 700ms ease-out both;
    border: 1px solid rgba(201,162,75,0.4);
    border-bottom: none;
  }
  .photo-wrap img{
    display:block;
    width:100%;
    height:auto;
  }

  .card{
    background: var(--ivory);
    color: var(--charcoal);
    width:100%;
    max-width: 460px;
    border-radius: 0 0 18px 18px;
    padding: 0 0 40px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.55);
    z-index:1;
    animation: rise 700ms ease-out both;
  }

  @keyframes rise{
    from{ opacity:0; transform: translateY(18px); }
    to{ opacity:1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    .card, .arch-wrap svg .flicker { animation: none !important; }
  }

  .card-inner{ padding: 8px 38px 0; }

  .eyebrow{
    text-align:center;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 11px;
    color: var(--wine);
    font-weight: 600;
    margin: 26px 0 6px;
  }

  h1.names{
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 42px;
    text-align:center;
    margin: 0 0 4px;
    line-height: 1.05;
    color: var(--indigo);
  }

  .ampersand{
    color: var(--wine);
    font-style: italic;
    font-weight: 500;
    padding: 0 6px;
  }

  .subline{
    text-align:center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 19px;
    color: #55524a;
    margin: 0 0 22px;
  }

  .divider{
    display:flex;
    align-items:center;
    gap:10px;
    margin: 22px 0;
  }
  .divider .line{ flex:1; height:1px; background: linear-gradient(90deg, transparent, var(--gold-soft), transparent); }
  .divider .mark{ color: var(--gold); font-size: 14px; }

  .details{
    display:flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 26px;
  }

  .detail-row{
    display:flex;
    gap:14px;
    align-items:flex-start;
  }

  .detail-icon{
    flex: 0 0 30px;
    height:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    color: var(--gold);
  }

  .detail-text .label{
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: #8b8778;
    font-weight:600;
    margin-bottom: 2px;
  }
  .detail-text .value{
    font-size: 16px;
    color: var(--charcoal);
    font-weight: 500;
  }

  .greeting{
    font-size: 15px;
    line-height:1.6;
    color: #43413a;
    margin-bottom: 22px;
  }
  .greeting .guest-name{
    color: var(--wine);
    font-weight: 600;
  }

  /* RSVP block */
  .rsvp-block{ margin-top: 6px; }

  .rsvp-question{
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--indigo);
    text-align:center;
    margin-bottom: 16px;
  }

  .choice-row{
    display:flex;
    gap:12px;
    margin-bottom: 18px;
  }

  .choice-btn{
    flex:1;
    padding: 14px 10px;
    border-radius: 10px;
    border: 1.5px solid #ddd6c4;
    background: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--charcoal);
    cursor:pointer;
    transition: all 160ms ease;
  }
  .choice-btn:hover{ border-color: var(--gold); }
  .choice-btn:focus-visible{ outline: 2px solid var(--wine); outline-offset:2px; }
  .choice-btn.selected-yes{ background: var(--wine); border-color: var(--wine); color: var(--ivory); }
  .choice-btn.selected-no{ background: var(--indigo); border-color: var(--indigo); color: var(--ivory); }
  .choice-btn.selected-maybe{ background: var(--gold); border-color: var(--gold); color: var(--indigo); }

  .party-grid{ display:flex; gap: 16px; margin-bottom: 16px; }
  .party-col{ flex:1; }
  .party-col label{
    display:block; font-size: 11px; text-transform:uppercase; letter-spacing:0.12em;
    color: #8b8778; font-weight:600; margin-bottom: 6px;
  }

  .field{
    margin-bottom: 16px;
  }
  .field label{
    display:block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #8b8778;
    font-weight:600;
    margin-bottom: 6px;
  }
  .field input, .field textarea{
    width:100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1.5px solid #ddd6c4;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    background: #fff;
    color: var(--charcoal);
  }
  .field input:focus, .field textarea:focus{
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,162,75,0.18);
  }

  .party-size{ display:flex; align-items:center; gap:12px; }
  .stepper{ display:flex; align-items:center; gap:10px; }
  .stepper button{
    width:32px; height:32px; border-radius:50%;
    border:1.5px solid #ddd6c4; background:#fff; color:var(--indigo);
    font-size:16px; font-weight:700; cursor:pointer;
  }
  .stepper button:focus-visible{ outline: 2px solid var(--wine); outline-offset:2px; }
  .stepper span{ min-width: 20px; text-align:center; font-weight:600; }

  .submit-btn{
    width:100%;
    padding: 15px;
    border-radius: 10px;
    border: none;
    background: var(--wine);
    color: var(--ivory);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.02em;
    cursor:pointer;
    margin-top: 6px;
    transition: filter 150ms ease;
  }
  .submit-btn:hover{ filter: brightness(1.08); }
  .submit-btn:disabled{ opacity:0.5; cursor:not-allowed; }
  .submit-btn:focus-visible{ outline: 2px solid var(--gold); outline-offset:2px; }

  .hint{
    font-size: 12.5px;
    color: #8b8778;
    text-align:center;
    margin-top: 10px;
    line-height:1.5;
  }

  .status-banner{
    text-align:center;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 18px;
  }
  .status-banner.yes{ background:#EFE6E8; color: var(--wine); }
  .status-banner.no{ background:#E7E9F0; color: var(--indigo); }
  .status-banner.maybe{ background:#F5EDD9; color:#8A6D1F; }

  .edit-link{
    display:block;
    text-align:center;
    margin-top: 14px;
    font-size: 13px;
    color: var(--wine);
    text-decoration: underline;
    cursor:pointer;
    background:none; border:none; font-family:inherit;
  }

  .confirmation{
    text-align:center;
    padding: 10px 0 4px;
  }
  .confirmation .glyph{
    font-size: 34px;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .confirmation h2{
    font-family:'Cormorant Garamond', serif;
    font-size: 26px;
    color: var(--indigo);
    margin: 0 0 8px;
  }
  .confirmation p{ color:#55524a; font-size:14.5px; line-height:1.6; margin: 0 0 18px;}

  .loading, .error-box{
    text-align:center;
    padding: 60px 20px;
    color: var(--ivory);
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
  }

  /* ADMIN */
  .admin-wrap{
    width:100%; max-width: 640px;
    background: var(--ivory); color: var(--charcoal);
    border-radius: 14px; padding: 32px 30px 40px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.55);
  }
  .admin-wrap h1{
    font-family:'Cormorant Garamond', serif;
    color: var(--indigo); font-size: 30px; margin: 0 0 4px;
  }
  .admin-wrap .sub{ color:#8b8778; font-size:13px; margin-bottom:22px; }
  .admin-section{ margin-bottom: 30px; }
  .admin-section h2{
    font-size: 12px; text-transform:uppercase; letter-spacing:0.12em;
    color: var(--wine); font-weight:700; margin-bottom:12px;
  }
  textarea.bulk{
    width:100%; min-height:110px; padding:12px 14px; border-radius:8px;
    border:1.5px solid #ddd6c4; font-family:'Inter',monospace; font-size:13.5px;
  }
  .admin-btn{
    padding:10px 18px; border-radius:8px; border:none; background:var(--wine);
    color:var(--ivory); font-weight:600; font-size:13.5px; cursor:pointer; margin-top:10px;
  }
  .admin-btn.secondary{ background: var(--indigo); }
  table.guest-table{ width:100%; border-collapse: collapse; font-size:13.5px; }
  table.guest-table th{
    text-align:left; text-transform:uppercase; font-size:10.5px; letter-spacing:0.1em;
    color:#8b8778; padding: 8px 6px; border-bottom: 1.5px solid #eee6d4;
  }
  table.guest-table td{ padding: 9px 6px; border-bottom: 1px solid #f0ebdd; vertical-align: top; }
  .pill{ padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; }
  .pill.yes{ background:#EFE6E8; color:var(--wine); }
  .pill.no{ background:#E7E9F0; color:var(--indigo); }
  .pill.maybe{ background:#F5EDD9; color:#8A6D1F; }
  .pill.pending{ background:#f2ede0; color:#8b8778; }
  .copy-link{ font-size:12px; color:var(--wine); cursor:pointer; text-decoration:underline; word-break: break-all; }
  .admin-login{ max-width:340px; margin: 100px auto 0; text-align:center; }
  .admin-login input{ width:100%; padding:12px 14px; border-radius:8px; border:1.5px solid #ddd6c4; margin: 14px 0; font-size:15px; }
  .summary-row{ display:flex; gap:18px; margin-bottom:18px; flex-wrap:wrap; }
  .summary-chip{ background:#F2EDE0; padding:10px 16px; border-radius:10px; font-size:13px; }
  .summary-chip b{ display:block; font-family:'Cormorant Garamond', serif; font-size:22px; color:var(--indigo); }
</style>
</head>

  const ADMIN_PASSCODE = "MaroGeorge2026"; // change this to something only you know

  // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE (see SETUP_INSTRUCTIONS.md)
  const API_URL = "https://script.google.com/macros/s/AKfycbwzEPctYkISweBpnYKHBXpvk7RMCM7xiQxYgI-xnmEOZ7p2wjqDUm_Xfa7d4DcCro-T/exec";

  // PASTE YOUR ACTUAL PUBLISHED WIX PAGE URL HERE — this ensures personal
  // links point to your real site, not Wix's internal file storage address.
  // Example: "https://yourname.wixsite.com/engagement-rsvp"
  const SITE_URL = "https://MaroandGeorge.com/engagement/";

  const params = new URLSearchParams(window.location.search);
  const hash = window.location.hash || '';
  const hashParams = new URLSearchParams(hash.replace(/^#\/?/, ''));

  // When embedded in a host page (e.g. a Wix HTML element) on the SAME domain,
  // we can read the real page URL directly — no host-side code required.
  // This is wrapped in try/catch because if the host is a different domain,
  // browsers block this access entirely (and that's fine — we just fall back).
  function getOuterParam(name){
    const tryWindow = (w) => {
      try{
        if (w && w !== window && w.location){
          const p = new URLSearchParams(w.location.search);
          if (p.has(name)) return p.get(name);
          const h = w.location.hash || '';
          const hp = new URLSearchParams(h.replace(/^#\/?/, ''));
          if (hp.has(name)) return hp.get(name);
        }
      }catch(e){ /* cross-origin — ignore, fall back to open invite */ }
      return null;
    };
    return tryWindow(window.parent) || tryWindow(window.top);
  }

  const guestId = params.get('g') || hashParams.get('g') || getOuterParam('g');
  let currentGuestId = guestId;
  const isAdmin = params.has('admin') || hash.includes('admin') || !!getOuterParam('admin');
  const app = document.getElementById('app');

  function esc(s){
    const d = document.createElement('div');
    d.innerText = s == null ? '' : s;
    return d.innerHTML;
  }

  function photoHTML(){
    return `
    <div class="photo-wrap">
      <img src="${PHOTO_DATA_URI}" alt="Maro and George celebrating their engagement by the water" />
    </div>`;
  }

  // ---------- STORAGE HELPERS ----------
  // ---------- BACKEND API HELPERS (Google Apps Script + Sheet) ----------
  async function apiGet(action, params){
    params = params || {};
    const url = new URL(API_URL);
    url.searchParams.set('action', action);
    Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
    const res = await fetch(url.toString());
    return res.json();
  }
  async function apiPost(action, payload){
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight
      body: JSON.stringify(Object.assign({ action: action }, payload))
    });
    return res.json();
  }

  async function listRSVPs(){
    try{
      const data = await apiGet('listRSVPs');
      return (data.rsvps || []).map(r => ({ id: r.id, record: r }));
    }catch(e){ console.error(e); return []; }
  }
  async function getRSVP(id){
    const entries = await listRSVPs();
    const match = entries.find(e => e.id === id);
    return match ? match.record : null;
  }
  async function setRSVP(id, data){
    return apiPost('saveRSVP', Object.assign({ id: id }, data));
  }
  async function listGuests(){
    try{
      const data = await apiGet('listGuests');
      return data.guests || [];
    }catch(e){ console.error(e); return []; }
  }
  async function findGuestById(id){
    const guests = await listGuests();
    return guests.find(g => g.id === id) || null;
  }
  async function getGuestData(id){
    try{
      const data = await apiGet('getGuestData', { id });
      return { guest: data.guest || null, rsvp: data.rsvp || null };
    }catch(e){ console.error(e); return { guest: null, rsvp: null }; }
  }
  async function addGuests(guestArray){
    return apiPost('addGuests', { guests: guestArray });
  }

  function makeId(){
    return Math.random().toString(36).slice(2, 8);
  }

  function displayLink(url){
    // Strips the protocol for a cleaner-looking link — most messaging apps
    // (iMessage, Android Messages) still auto-detect and hyperlink a bare
    // domain like "MaroandGeorge.com/..." without needing "https://" shown.
    return url.replace(/^https?:\/\//i, '');
  }

  function baseUrl(){
    // Prefer an explicitly configured public URL if you've set one (most reliable).
    if (SITE_URL && SITE_URL !== "PASTE_YOUR_PUBLISHED_WIX_URL_HERE"){
      return SITE_URL.replace(/\/$/, '') + '/';
    }
    // Otherwise, try to read the real page address from the parent Wix page
    // (works when same-origin, which the query-param lookup already relies on).
    try{
      if (window.parent && window.parent !== window && window.parent.location){
        return window.parent.location.origin + window.parent.location.pathname;
      }
    }catch(e){ /* cross-origin — fall through */ }
    // Last resort: this page's own address (may be the internal file URL if embedded).
    return window.location.origin + window.location.pathname;
  }

  // ---------- GUEST RSVP VIEW ----------

    app.innerHTML = `

  function headerHTML(){
    return `
      <div class="eyebrow">You're Invited</div>
      <h1 class="names">${esc(EVENT.coupleA)}<span class="ampersand">&amp;</span>${esc(EVENT.coupleB)}</h1>

  function footerHTML(){
    return `
      <div style="margin-top:26px;padding-top:16px;border-top:1px solid #eee6d4;text-align:center;">
        <button type="button" id="editRsvpLink" style="background:none;border:none;font-family:'Inter',sans-serif;font-size:12px;color:var(--wine);cursor:pointer;text-decoration:underline;margin-right:16px;">Edit RSVP</button>
        <button type="button" id="orgLink" style="background:none;border:none;font-family:'Inter',sans-serif;font-size:11.5px;color:#b8b2a0;cursor:pointer;text-decoration:underline;">Event organizers</button>
      </div>
    `;
  }

  function wireFooter(){
    const el = document.getElementById('orgLink');
    if (el) el.addEventListener('click', () => renderAdminLogin());
    const editEl = document.getElementById('editRsvpLink');
    if (editEl) editEl.addEventListener('click', () => renderEditByEmail());
  }

  function renderEditByEmail(){
    const bodyHTML = headerHTML() + `
      <div class="greeting" style="text-align:center;">Enter the email you used when you RSVP'd, and we'll pull up your response so you can make changes.</div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="lookupEmail" placeholder="you@example.com" />
      </div>
      <button class="submit-btn" id="lookupBtn">Find My RSVP</button>
      <button type="button" id="backToInviteBtn" style="background:none;border:none;font-family:'Inter',sans-serif;font-size:13px;color:var(--wine);text-decoration:underline;cursor:pointer;display:block;margin:14px auto 0;">Back to invitation</button>
    ` + footerHTML();
    renderCardShell(bodyHTML);
    wireFooter();

    document.getElementById('backToInviteBtn').addEventListener('click', () => renderGuestFlow());

    document.getElementById('lookupBtn').addEventListener('click', async () => {
      const btn = document.getElementById('lookupBtn');
      const email = (document.getElementById('lookupEmail').value || '').trim().toLowerCase();
      if (!email){ alert('Please enter an email address.'); return; }
      btn.disabled = true;
      btn.innerText = 'Searching…';
      const entries = await listRSVPs();
      const match = entries.find(e => (e.record.email || '').trim().toLowerCase() === email);
      if (!match){
        alert("We couldn't find an RSVP with that email. Please double check it, or submit a new response from the invitation page.");
        btn.disabled = false;
        btn.innerText = 'Find My RSVP';
        return;
      }
      currentGuestId = match.id;
      const inner = document.querySelector('.card-inner');
      inner.innerHTML = headerHTML() + detailsHTML() + renderForm(match.record.name, match.record) + footerHTML();
      wireForm(match.record.name, match.record);
      wireFooter();
    });
  }

  async function renderGuestFlow(){
    if (currentGuestId){
      // A personal link was detected — show a lightweight loading state
      // instead of the fillable form, so nothing gets swapped out from
      // under someone who's already started typing.
      const loadingBody = headerHTML() + `<div class="loading" style="color:#8b8778; padding:30px 0;">Loading your invitation…</div>`;
      renderCardShell(loadingBody);
      await tryPersonalize(currentGuestId);
    } else {
      // No personal link — show the open-invite form immediately.
      let bodyHTML = headerHTML() + detailsHTML() + renderForm(null, null) + footerHTML();
      renderCardShell(bodyHTML);
      wireFooter();
      wireForm(null);
    }
  }

  async function tryPersonalize(id){
    const { guest, rsvp } = await getGuestData(id);
    if (!guest){
      // Personal link didn't match anything (bad/old link) — fall back
      // to the normal open-invite form so the guest can still RSVP.
      currentGuestId = null;
      let bodyHTML = headerHTML() + detailsHTML() + renderForm(null, null) + footerHTML();
      renderCardShell(bodyHTML);
      wireFooter();
      wireForm(null);
      return;
    }
    currentGuestId = id;
    let bodyHTML = headerHTML() + detailsHTML();
    bodyHTML += rsvp ? renderSummary(rsvp) : renderForm(guest.name, null);
    bodyHTML += footerHTML();
    renderCardShell(bodyHTML);
    wireFooter();
    if (rsvp) wireSummary(rsvp);
    else wireForm(guest.name);
  }

  // Listen for Wix (or any host page) handing us a guest id via postMessage,
  // since URL query strings aren't always reliably passed into embedded pages.
  window.addEventListener('message', (event) => {
    const data = event.data;
    if (data && data.type === 'setGuest' && data.guestId){
      tryPersonalize(data.guestId);
    }
  });

  function renderSummary(rsvp){
    const isYes = rsvp.response === 'yes';
    const isMaybe = rsvp.response === 'maybe';
    const bannerClass = isYes ? 'yes' : (isMaybe ? 'maybe' : 'no');
    const bannerText = isYes
      ? "✓ You're marked as attending"
      : (isMaybe ? "You've marked yourself as a maybe" : "You've let us know you can't make it");
    const adults = rsvp.adults || 1;
    const kids = rsvp.kids || 0;
    return `
      <div class="status-banner ${bannerClass}">${bannerText}</div>
      <div class="greeting">
        Thank you, <span class="guest-name">${esc(rsvp.name)}</span> — your response has been recorded.
        ${isYes ? `We have you down for <b>${esc(String(adults))}</b> adult(s)${kids ? ` and <b>${esc(String(kids))}</b> kid(s)` : ''}.` : ''}
        ${rsvp.message ? `<br><br><span style="font-style:italic;color:#6b6858;">"${esc(rsvp.message)}"</span>` : ''}
      </div>
      <button class="edit-link" id="editBtn">Need to change your response? Edit it here</button>
    `;
  }

  function wireSummary(rsvp){
    document.getElementById('editBtn').addEventListener('click', () => {
      const inner = document.querySelector('.card-inner');
      inner.innerHTML = headerHTML() + detailsHTML() + renderForm(rsvp.name, rsvp) + footerHTML();
      wireForm(rsvp.name, rsvp);
      wireFooter();
    });
  }

  function renderForm(prefillName, existing){
    const nameVal = existing ? existing.name : (prefillName || '');
    const emailVal = existing ? (existing.email || '') : '';
    const messageVal = existing ? (existing.message || '') : '';
    const adults = existing ? (existing.adults || 1) : 1;
    const kids = existing ? (existing.kids || 0) : 0;
    const selectedYes = existing && existing.response === 'yes';
    const selectedNo = existing && existing.response === 'no';
    const selectedMaybe = existing && existing.response === 'maybe';

    return `
      <div class="greeting">
        ${prefillName ? `Dear <span class="guest-name">${esc(prefillName)}</span>, we would be honored to have you join us as we celebrate.` : `We would be honored to have you join us as we celebrate.`}
      </div>
      <div class="rsvp-block">
        <div class="rsvp-question">Will you be joining us?</div>
        <div class="choice-row">
          <button type="button" class="choice-btn ${selectedYes ? 'selected-yes' : ''}" id="btnYes">Joyfully Accept</button>
          <button type="button" class="choice-btn ${selectedMaybe ? 'selected-maybe' : ''}" id="btnMaybe">Maybe</button>
          <button type="button" class="choice-btn ${selectedNo ? 'selected-no' : ''}" id="btnNo">Regretfully Decline</button>
        </div>

        <div class="field" id="nameField">
          <label>Your Name</label>
          <input type="text" id="nameInput" placeholder="Full name" value="${esc(nameVal)}" />
        </div>

        <div class="party-grid" id="partyField" style="display:none;">
          <div class="party-col">
            <label>Adults</label>
            <div class="stepper">
              <button type="button" id="adultsMinus">–</button>
              <span id="adultsCount">${adults}</span>
              <button type="button" id="adultsPlus">+</button>
            </div>
          </div>
          <div class="party-col">
            <label>Kids</label>
            <div class="stepper">
              <button type="button" id="kidsMinus">–</button>
              <span id="kidsCount">${kids}</span>
              <button type="button" id="kidsPlus">+</button>
            </div>
          </div>
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" id="emailInput" placeholder="you@example.com" value="${esc(emailVal)}" />
        </div>

        <div class="field">
          <label>Message (optional)</label>
          <textarea id="messageInput" rows="3" placeholder="Leave a note for the couple...">${esc(messageVal)}</textarea>
        </div>

        <button class="submit-btn" id="submitBtn" disabled>Confirm Response</button>
        <div class="hint">Enter your email so you can return to this link anytime and update your response.</div>
      </div>
    `;
  }

  function wireForm(prefillName, existing){
    let response = existing ? existing.response : null;
    let adults = existing ? (existing.adults || 1) : 1;
    let kids = existing ? (existing.kids || 0) : 0;

    const btnYes = document.getElementById('btnYes');
    const btnMaybe = document.getElementById('btnMaybe');
    const btnNo = document.getElementById('btnNo');
    const partyField = document.getElementById('partyField');
    const adultsCountEl = document.getElementById('adultsCount');
    const kidsCountEl = document.getElementById('kidsCount');
    const submitBtn = document.getElementById('submitBtn');
    const emailInput = document.getElementById('emailInput');
    const nameInput = document.getElementById('nameInput');
    const messageInput = document.getElementById('messageInput');

    function refreshChoiceUI(){
      btnYes.classList.toggle('selected-yes', response === 'yes');
      btnMaybe.classList.toggle('selected-maybe', response === 'maybe');
      btnNo.classList.toggle('selected-no', response === 'no');
      partyField.style.display = response === 'yes' ? 'flex' : 'none';
      submitBtn.disabled = !response;
    }
    refreshChoiceUI();

    btnYes.addEventListener('click', () => { response = 'yes'; refreshChoiceUI(); });
    btnMaybe.addEventListener('click', () => { response = 'maybe'; refreshChoiceUI(); });
    btnNo.addEventListener('click', () => { response = 'no'; refreshChoiceUI(); });

    document.getElementById('adultsMinus').addEventListener('click', () => {
      adults = Math.max(1, adults - 1);
      adultsCountEl.innerText = adults;
    });
    document.getElementById('adultsPlus').addEventListener('click', () => {
      adults = Math.min(15, adults + 1);
      adultsCountEl.innerText = adults;
    });
    document.getElementById('kidsMinus').addEventListener('click', () => {
      kids = Math.max(0, kids - 1);
      kidsCountEl.innerText = kids;
    });
    document.getElementById('kidsPlus').addEventListener('click', () => {
      kids = Math.min(15, kids + 1);
      kidsCountEl.innerText = kids;
    });

    submitBtn.addEventListener('click', async () => {
      const finalName = nameInput ? nameInput.value.trim() : prefillName;
      const email = emailInput.value.trim();
      const message = messageInput.value.trim();
      if (!finalName){ alert('Please enter your name.'); return; }
      if (!response){ alert('Please choose whether you can attend.'); return; }

      submitBtn.disabled = true;
      submitBtn.innerText = 'Saving…';

      const record = {
        name: finalName,
        email: email,
        response: response,
        adults: response === 'yes' ? adults : 1,
        kids: response === 'yes' ? kids : 0,
        message: message,
        updatedAt: new Date().toISOString()
      };

      const idToUse = currentGuestId || ('guest_' + finalName.toLowerCase().replace(/[^a-z0-9]+/g,'_'));

      try{
        await setRSVP(idToUse, record);
        const inner = document.querySelector('.card-inner');
        inner.innerHTML = headerHTML() + detailsHTML() + renderSummary(record) + footerHTML();
        wireSummary(record);
        wireFooter();
      }catch(e){
        alert('Something went wrong saving your response. Please try again.');
        submitBtn.disabled = false;
        submitBtn.innerText = 'Confirm Response';
      }
    });
  }

  // ---------- ADMIN VIEW ----------
  function renderAdminLogin(){
    app.innerHTML = `
      <div class="admin-login card" style="padding:34px;">
        <h1 style="font-family:'Cormorant Garamond',serif;color:var(--indigo);font-size:26px;margin:0;">Admin Access</h1>
        <input type="password" id="pass" placeholder="Enter passcode" />
        <button class="admin-btn" id="loginBtn">Enter</button>
      </div>
    `;
    document.getElementById('loginBtn').addEventListener('click', () => {
      if (document.getElementById('pass').value === ADMIN_PASSCODE){
        sessionStorageSafeSet();
        renderAdmin();
      } else {
        alert('Incorrect passcode.');
      }
    });
  }

  // NOTE: no browser localStorage/sessionStorage per platform rules — use a module-level flag instead.
  let adminUnlocked = false;
  function sessionStorageSafeSet(){ adminUnlocked = true; }

  async function renderAdmin(){
    app.innerHTML = `<div class="loading">Loading guest list…</div>`;
    const guests = await listGuests();

    const rsvpEntries = await listRSVPs();
    const rsvps = rsvpEntries.map(e => e.record);
    const yesRsvps = rsvps.filter(r => r.response === 'yes');
    const adultsTotal = yesRsvps.reduce((a,r) => a + (r.adults || 1), 0);
    const kidsTotal = yesRsvps.reduce((a,r) => a + (r.kids || 0), 0);
    const maybeCount = rsvps.filter(r => r.response === 'maybe').length;
    const noCount = rsvps.filter(r => r.response === 'no').length;

    app.innerHTML = `
      <div class="admin-wrap">
        <h1>Guest List &amp; RSVPs</h1>
        <div class="sub">${esc(EVENT.coupleA)} &amp; ${esc(EVENT.coupleB)}'s ${esc(EVENT.title)}</div>

        <div class="summary-row">
          <div class="summary-chip"><b>${rsvps.length}</b>Responses so far</div>
          <div class="summary-chip"><b>${adultsTotal}</b>Adults attending</div>
          <div class="summary-chip"><b>${kidsTotal}</b>Kids attending</div>
          <div class="summary-chip"><b>${maybeCount}</b>Maybe</div>
          <div class="summary-chip"><b>${noCount}</b>Declined</div>
        </div>

        <div class="admin-section">
          <div style="display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:10px;">
            <h2 style="margin-bottom:0;">RSVP Responses (${rsvps.length})</h2>
            <input type="text" id="rsvpSearch" placeholder="Search name or email…" style="padding:8px 12px;border-radius:8px;border:1.5px solid #ddd6c4;font-size:13px;min-width:200px;" />
          </div>
          <div style="font-size:12.5px;color:#8b8778;margin:8px 0;">This is an open invite, so responses are matched by whatever name each guest typed in — not linked to a specific person on your phone list below.</div>
          <table class="guest-table">
            <thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Message</th></tr></thead>
            <tbody id="rsvpTableBody"></tbody>
          </table>
          <div id="rsvpPagination" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-top:14px;"></div>
        </div>

        <div class="admin-section">
          <div style="display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:10px;">
            <h2 style="margin-bottom:0;">Phone List &amp; Personal Links (for texting)</h2>
            <input type="text" id="guestSearch" placeholder="Search name or phone…" style="padding:8px 12px;border-radius:8px;border:1.5px solid #ddd6c4;font-size:13px;min-width:200px;" />
          </div>
          <div style="font-size:12.5px;color:#8b8778;margin:8px 0;">One per line: <code>Name, Phone</code> (phone in E.164 format e.g. +13125551234). Each person gets their own personal link with their name pre-filled. You can also just share the general invite link (no personal link needed) with anyone else — both work.</div>
          <textarea class="bulk" id="bulkInput" placeholder="Mina Fahmy, +13125551234&#10;Sarah Boutros, +17735559876"></textarea>
          <button class="admin-btn" id="addBtn">Add to phone list</button>
          <button class="admin-btn secondary" id="csvBtn">Export CSV for texting script</button>
          <table class="guest-table" style="margin-top:16px;">
            <thead><tr><th>Name</th><th>Phone</th><th>Personal Link</th></tr></thead>
            <tbody id="guestTableBody"></tbody>
          </table>
          <div id="guestPagination" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-top:14px;"></div>
        </div>
      </div>
    `;

    // ---------- Guest table: search + pagination (client-side) ----------
    let guestSearchTerm = '';
    let guestPageSize = 10; // 10 | 20 | 50 | 'all'
    let guestPage = 1;

    function getFilteredGuests(){
      if (!guestSearchTerm) return guests;
      const term = guestSearchTerm.toLowerCase();
      return guests.filter(g =>
        (g.name || '').toLowerCase().includes(term) ||
        (g.phone || '').toLowerCase().includes(term)
      );
    }

    function renderGuestTable(){
      const filtered = getFilteredGuests();
      const pageSize = guestPageSize === 'all' ? filtered.length || 1 : guestPageSize;
      const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
      if (guestPage > totalPages) guestPage = totalPages;
      if (guestPage < 1) guestPage = 1;

      const start = guestPageSize === 'all' ? 0 : (guestPage - 1) * pageSize;
      const end = guestPageSize === 'all' ? filtered.length : start + pageSize;
      const pageItems = filtered.slice(start, end);

      const rowsHtml = pageItems.map(g => {
        const link = baseUrl() + '?g=' + g.id;
        const shownLink = displayLink(link);
        return `
          <tr>
            <td>${esc(g.name || '')}</td>
            <td>${esc(g.phone || '')}</td>
            <td><span class="copy-link" data-link="${esc(shownLink)}">${esc(shownLink)}</span></td>
          </tr>
        `;
      }).join('');

      document.getElementById('guestTableBody').innerHTML = rowsHtml ||
        `<tr><td colspan="3" style="color:#8b8778;">${guests.length ? 'No matches found.' : 'No one added yet.'}</td></tr>`;

      const rangeStart = filtered.length ? start + 1 : 0;
      const rangeEnd = Math.min(end, filtered.length);

      document.getElementById('guestPagination').innerHTML = `
        <div style="font-size:12.5px;color:#8b8778;">
          Showing ${rangeStart}-${rangeEnd} of ${filtered.length}${guestSearchTerm ? ` (filtered from ${guests.length})` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <label style="font-size:12.5px;color:#8b8778;">Per page:
            <select id="guestPageSizeSelect" style="margin-left:4px;padding:4px 6px;border-radius:6px;border:1.5px solid #ddd6c4;">
              <option value="10">10</option>
              <option value="20">20</option>
              <option value="50">50</option>
              <option value="all">All</option>
            </select>
          </label>
          <button type="button" id="guestPrevBtn" class="admin-btn secondary" style="margin-top:0;padding:6px 12px;" ${guestPage<=1?'disabled':''}>Prev</button>
          <span style="font-size:12.5px;color:#8b8778;">Page ${guestPage} of ${totalPages}</span>
          <button type="button" id="guestNextBtn" class="admin-btn secondary" style="margin-top:0;padding:6px 12px;" ${guestPage>=totalPages?'disabled':''}>Next</button>
        </div>
      `;

      document.getElementById('guestPageSizeSelect').value = String(guestPageSize);
      document.getElementById('guestPageSizeSelect').addEventListener('change', (e) => {
        guestPageSize = e.target.value === 'all' ? 'all' : parseInt(e.target.value, 10);
        guestPage = 1;
        renderGuestTable();
      });
      document.getElementById('guestPrevBtn').addEventListener('click', () => {
        if (guestPage > 1){ guestPage--; renderGuestTable(); }
      });
      document.getElementById('guestNextBtn').addEventListener('click', () => {
        guestPage++; renderGuestTable();
      });

      document.querySelectorAll('.copy-link').forEach(el => {
        el.addEventListener('click', () => {
          navigator.clipboard.writeText(el.dataset.link);
          el.innerText = 'Copied!';
          setTimeout(() => { el.innerText = el.dataset.link; }, 1000);
        });
      });
    }

    renderGuestTable();

    document.getElementById('guestSearch').addEventListener('input', (e) => {
      guestSearchTerm = e.target.value.trim();
      guestPage = 1;
      renderGuestTable();
    });

    // ---------- RSVP Responses table: search + pagination (client-side) ----------
    let rsvpSearchTerm = '';
    let rsvpPageSize = 10;
    let rsvpPageNum = 1;

    function getFilteredRsvps(){
      if (!rsvpSearchTerm) return rsvps;
      const term = rsvpSearchTerm.toLowerCase();
      return rsvps.filter(r =>
        (r.name || '').toLowerCase().includes(term) ||
        (r.email || '').toLowerCase().includes(term)
      );
    }

    function renderRsvpTable(){
      const filtered = getFilteredRsvps();
      const pageSize = rsvpPageSize === 'all' ? filtered.length || 1 : rsvpPageSize;
      const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
      if (rsvpPageNum > totalPages) rsvpPageNum = totalPages;
      if (rsvpPageNum < 1) rsvpPageNum = 1;

      const start = rsvpPageSize === 'all' ? 0 : (rsvpPageNum - 1) * pageSize;
      const end = rsvpPageSize === 'all' ? filtered.length : start + pageSize;
      const pageItems = filtered.slice(start, end);

      const rowsHtml = pageItems.map(r => {
        let status = '<span class="pill no">No</span>';
        if (r.response === 'yes') status = `<span class="pill yes">Yes · ${r.adults||1}A${r.kids ? ' / ' + r.kids + 'K' : ''}</span>`;
        else if (r.response === 'maybe') status = `<span class="pill maybe">Maybe</span>`;
        const message = r.message ? esc(r.message) : '';
        return `
          <tr>
            <td>${esc(r.name)}</td>
            <td>${esc(r.email || '')}</td>
            <td>${status}</td>
            <td style="max-width:160px;font-style:italic;color:#6b6858;">${message}</td>
          </tr>
        `;
      }).join('');

      document.getElementById('rsvpTableBody').innerHTML = rowsHtml ||
        `<tr><td colspan="4" style="color:#8b8778;">${rsvps.length ? 'No matches found.' : 'No responses yet.'}</td></tr>`;

      const rangeStart = filtered.length ? start + 1 : 0;
      const rangeEnd = Math.min(end, filtered.length);

      document.getElementById('rsvpPagination').innerHTML = `
        <div style="font-size:12.5px;color:#8b8778;">
          Showing ${rangeStart}-${rangeEnd} of ${filtered.length}${rsvpSearchTerm ? ` (filtered from ${rsvps.length})` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <label style="font-size:12.5px;color:#8b8778;">Per page:
            <select id="rsvpPageSizeSelect" style="margin-left:4px;padding:4px 6px;border-radius:6px;border:1.5px solid #ddd6c4;">
              <option value="10">10</option>
              <option value="20">20</option>
              <option value="50">50</option>
              <option value="all">All</option>
            </select>
          </label>
          <button type="button" id="rsvpPrevBtn" class="admin-btn secondary" style="margin-top:0;padding:6px 12px;" ${rsvpPageNum<=1?'disabled':''}>Prev</button>
          <span style="font-size:12.5px;color:#8b8778;">Page ${rsvpPageNum} of ${totalPages}</span>
          <button type="button" id="rsvpNextBtn" class="admin-btn secondary" style="margin-top:0;padding:6px 12px;" ${rsvpPageNum>=totalPages?'disabled':''}>Next</button>
        </div>
      `;

      document.getElementById('rsvpPageSizeSelect').value = String(rsvpPageSize);
      document.getElementById('rsvpPageSizeSelect').addEventListener('change', (e) => {
        rsvpPageSize = e.target.value === 'all' ? 'all' : parseInt(e.target.value, 10);
        rsvpPageNum = 1;
        renderRsvpTable();
      });
      document.getElementById('rsvpPrevBtn').addEventListener('click', () => {
        if (rsvpPageNum > 1){ rsvpPageNum--; renderRsvpTable(); }
      });
      document.getElementById('rsvpNextBtn').addEventListener('click', () => {
        rsvpPageNum++; renderRsvpTable();
      });
    }

    renderRsvpTable();

    document.getElementById('rsvpSearch').addEventListener('input', (e) => {
      rsvpSearchTerm = e.target.value.trim();
      rsvpPageNum = 1;
      renderRsvpTable();
    });

    document.getElementById('addBtn').addEventListener('click', async () => {
      const raw = document.getElementById('bulkInput').value;
      const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
      const newGuests = [];
      for (const line of lines){
        const [name, phone] = line.split(',').map(s => (s||'').trim());
        if (!name) continue;
        newGuests.push({ name, phone: phone || '' });
      }
      if (newGuests.length){
        await addGuests(newGuests);
      }
      renderAdmin();
    });

    document.getElementById('csvBtn').addEventListener('click', () => {
      const csvRows = [['name','phone','link']];
      guests.forEach(g => {
        csvRows.push([g.name || '', g.phone || '', displayLink(baseUrl() + '?g=' + g.id)]);
      });
      const csv = csvRows.map(r => r.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'guests_for_texting.csv';
      a.click();
      URL.revokeObjectURL(url);
    });
  }

  // ---------- ROUTER ----------
  if (isAdmin){
    if (adminUnlocked) renderAdmin(); else renderAdminLogin();
  } else {
    renderGuestFlow();
  }
})();
</script>
</body>
</html>
